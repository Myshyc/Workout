<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<title>Workout Tracker</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #2a2a3a;
    --accent: #5b8cff;
    --accent2: #7c3aed;
    --green: #22c55e;
    --orange: #f97316;
    --purple: #a855f7;
    --blue: #3b82f6;
    --yellow: #eab308;
    --text: #f0f0ff;
    --text2: #8888aa;
    --text3: #555570;
    --radius: 14px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    min-height: 100vh;
    padding-bottom: 90px;
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.92);
    backdrop-filter: blur(20px);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--border);
  }

  .header-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
  }

  .date-label {
    font-size: 13px;
    color: var(--text2);
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  .save-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .save-btn:active { opacity: 0.7; }
  .save-btn.saving { background: var(--text3); }
  .save-btn.saved { background: var(--green); }

  .day-title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .day-subtitle {
    font-size: 13px;
    color: var(--text2);
    margin-top: 2px;
  }

  /* Progress bar */
  .progress-wrap {
    margin: 14px 20px 0;
    background: var(--surface2);
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  /* Nav tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin: 16px 20px 0;
    background: var(--surface);
    border-radius: 10px;
    padding: 3px;
  }
  .tab {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  /* Pages */
  .page { display: none; padding: 16px 20px; }
  .page.active { display: block; }

  /* Section headers */
  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--text3);
    text-transform: uppercase;
    margin: 20px 0 10px;
  }
  .section-label:first-child { margin-top: 0; }

  /* Exercise cards */
  .exercise-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }
  .exercise-card.done {
    border-color: var(--green);
    background: rgba(34,197,94,0.06);
  }

  .exercise-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .checkbox {
    width: 24px;
    height: 24px;
    border-radius: 7px;
    border: 2px solid var(--border);
    background: transparent;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    margin-top: 1px;
  }
  .checkbox.checked {
    background: var(--green);
    border-color: var(--green);
  }
  .checkbox.checked::after {
    content: '✓';
    color: white;
    font-size: 14px;
    font-weight: 700;
  }

  .exercise-info { flex: 1; }

  .exercise-name {
    font-size: 16px;
    font-weight: 600;
    line-height: 1.2;
  }
  .exercise-card.done .exercise-name {
    color: var(--text2);
    text-decoration: line-through;
  }

  .exercise-detail {
    font-size: 13px;
    color: var(--text2);
    margin-top: 4px;
  }

  .type-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .badge-Турник { background: rgba(59,130,246,0.15); color: var(--blue); }
  .badge-Отжимания { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge-Гантели { background: rgba(249,115,22,0.15); color: var(--orange); }
  .badge-Плавание { background: rgba(168,85,247,0.15); color: var(--purple); }
  .badge-Кор { background: rgba(234,179,8,0.15); color: var(--yellow); }

  /* Timer */
  .timer-bar {
    position: fixed;
    bottom: 70px;
    left: 20px;
    right: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 200;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transform: translateY(120px);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .timer-bar.visible { transform: translateY(0); }

  .timer-info { flex: 1; }
  .timer-label { font-size: 12px; color: var(--text2); margin-bottom: 2px; }
  .timer-count {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }
  .timer-count.urgent { color: var(--orange); }

  .timer-progress {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
  }
  .timer-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--purple));
    border-radius: 2px;
    transition: width 1s linear;
  }

  .timer-skip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text2);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    margin-left: 14px;
  }
  .timer-skip:active { opacity: 0.7; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 24px;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    padding: 4px 0;
  }
  .nav-icon { font-size: 22px; }
  .nav-label { font-size: 10px; font-weight: 600; color: var(--text3); }
  .nav-item.active .nav-label { color: var(--accent); }

  /* Stats page */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    border: 1px solid var(--border);
  }

  .stat-value {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, var(--accent), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .stat-label {
    font-size: 12px;
    color: var(--text2);
    margin-top: 4px;
  }

  .streak-card {
    background: linear-gradient(135deg, rgba(91,140,255,0.12), rgba(124,58,237,0.12));
    border-radius: var(--radius);
    padding: 20px;
    border: 1px solid rgba(91,140,255,0.2);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .streak-fire { font-size: 40px; }

  .streak-text .streak-num {
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.03em;
  }
  .streak-text .streak-sub { font-size: 13px; color: var(--text2); }

  .history-item {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-bottom: 8px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .history-date { font-size: 14px; font-weight: 600; }
  .history-day { font-size: 12px; color: var(--text2); margin-top: 2px; }

  .history-score {
    font-size: 13px;
    font-weight: 700;
    padding: 5px 12px;
    border-radius: 20px;
  }
  .score-100 { background: rgba(34,197,94,0.15); color: var(--green); }
  .score-50 { background: rgba(234,179,8,0.15); color: var(--yellow); }
  .score-0 { background: rgba(136,136,170,0.1); color: var(--text3); }

  /* Toast */
  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--orange); color: var(--orange); }

  /* Week overview */
  .week-strip {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
  }
  .week-day {
    flex: 1;
    aspect-ratio: 1;
    border-radius: 10px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-size: 10px;
    font-weight: 700;
    color: var(--text3);
    cursor: pointer;
  }
  .week-day.today { border-color: var(--accent); color: var(--accent); }
  .week-day.done-day { background: rgba(34,197,94,0.1); border-color: var(--green); color: var(--green); }
  .week-day.partial { background: rgba(234,179,8,0.08); border-color: var(--yellow); color: var(--yellow); }
  .week-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="date-label" id="dateLabel"></div>
    <button class="save-btn" id="saveBtn" onclick="saveToNotion()">
      <span>💾</span> <span id="saveBtnText">Сохранить</span>
    </button>
  </div>
  <div class="day-title" id="dayTitle"></div>
  <div class="day-subtitle" id="daySubtitle"></div>
  <div class="progress-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="tabs" style="margin-top:14px">
    <div class="tab active" onclick="switchTab('today')">Сегодня</div>
    <div class="tab" onclick="switchTab('week')">Неделя</div>
    <div class="tab" onclick="switchTab('stats')">Прогресс</div>
  </div>
</div>

<!-- TODAY PAGE -->
<div class="page active" id="page-today"></div>

<!-- WEEK PAGE -->
<div class="page" id="page-week">
  <div class="week-strip" id="weekStrip"></div>
  <div id="weekDayPlan"></div>
</div>

<!-- STATS PAGE -->
<div class="page" id="page-stats">
  <div class="streak-card">
    <div class="streak-fire">🔥</div>
    <div class="streak-text">
      <div class="streak-num" id="streakNum">0</div>
      <div class="streak-sub">дней подряд</div>
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="totalWorkouts">0</div>
      <div class="stat-label">тренировок всего</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="thisWeekCount">0</div>
      <div class="stat-label">на этой неделе</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="totalExercises">0</div>
      <div class="stat-label">упражнений сделано</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="avgCompletion">0%</div>
      <div class="stat-label">среднее выполнение</div>
    </div>
  </div>
  <div class="section-label">История</div>
  <div id="historyList"></div>
</div>

<!-- Timer -->
<div class="timer-bar" id="timerBar">
  <div class="timer-info">
    <div class="timer-label">Отдых</div>
    <div class="timer-count" id="timerCount">1:30</div>
    <div class="timer-progress">
      <div class="timer-progress-bar" id="timerProgressBar" style="width:100%"></div>
    </div>
  </div>
  <button class="timer-skip" onclick="stopTimer()">Пропустить</button>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const NOTION_DB = 'collection://a62a0360-9a76-4340-90f0-3a52c96497cd';

const DAYS = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
const DAYS_SHORT = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
const MONTHS = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];

// WORKOUT PLAN
const PLAN = {
  1: { // Понедельник
    name: 'Верх тела + Озеро',
    exercises: [
      { name: 'Подтягивания', detail: '4 подхода × максимум', type: 'Турник', rest: 90 },
      { name: 'Негативные подтягивания', detail: '3 подхода × 5 (медленно 5 сек)', type: 'Турник', rest: 90 },
      { name: 'Отжимания широкие', detail: '4 подхода × 12', type: 'Отжимания', rest: 60 },
      { name: 'Отжимания узкие (трицепс)', detail: '3 подхода × 10', type: 'Отжимания', rest: 60 },
      { name: 'Плавание интервалы', detail: '10 × 20 сек / 40 сек отдых', type: 'Плавание', rest: 0 },
      { name: 'Свободное плавание', detail: '5–10 минут спокойно', type: 'Плавание', rest: 0 },
    ]
  },
  2: { // Вторник
    name: 'Ноги + Кор + Озеро',
    exercises: [
      { name: 'Приседания', detail: '4 подхода × 20', type: 'Кор', rest: 60 },
      { name: 'Выпады', detail: '3 подхода × 12 на каждую ногу', type: 'Кор', rest: 60 },
      { name: 'Планка', detail: '3 подхода × 45 сек', type: 'Кор', rest: 45 },
      { name: 'Скручивания', detail: '3 подхода × 20', type: 'Кор', rest: 45 },
      { name: 'Плавание восстановление', detail: '20–30 минут спокойно', type: 'Плавание', rest: 0 },
    ]
  },
  3: { // Среда
    name: 'Гантели + Турник + Озеро',
    exercises: [
      { name: 'Тяга гантели в наклоне', detail: '4 подхода × 12', type: 'Гантели', rest: 75 },
      { name: 'Жим гантелей стоя', detail: '3 подхода × 12', type: 'Гантели', rest: 75 },
      { name: 'Curl — бицепс', detail: '3 подхода × 15', type: 'Гантели', rest: 60 },
      { name: 'Разводка в стороны', detail: '3 подхода × 15', type: 'Гантели', rest: 60 },
      { name: 'Подтягивания', detail: '3 подхода × максимум', type: 'Турник', rest: 90 },
      { name: 'Плавание интервалы', detail: '10 × 25 сек / 35 сек отдых', type: 'Плавание', rest: 0 },
    ]
  },
  4: { // Четверг
    name: 'Лёгкий день + Озеро',
    exercises: [
      { name: 'Растяжка', detail: '15 минут — всё тело', type: 'Кор', rest: 0 },
      { name: 'Отжимания разминка', detail: '2 подхода × 10', type: 'Отжимания', rest: 45 },
      { name: 'Долгое плавание', detail: '30–40 минут — выносливость', type: 'Плавание', rest: 0 },
    ]
  },
  5: { // Пятница
    name: 'Верх тела + Озеро',
    exercises: [
      { name: 'Подтягивания', detail: '5 подходов × максимум', type: 'Турник', rest: 90 },
      { name: 'Отжимания с ногами на стуле', detail: '4 подхода × 8', type: 'Отжимания', rest: 75 },
      { name: 'Отжимания обычные', detail: '4 подхода × 15', type: 'Отжимания', rest: 60 },
      { name: 'Негативные подтягивания', detail: '3 подхода × 5', type: 'Турник', rest: 90 },
      { name: 'Плавание интервалы', detail: '12 × 25 сек / 35 сек отдых', type: 'Плавание', rest: 0 },
    ]
  },
  6: { // Суббота
    name: 'Всё тело + Долгое озеро',
    exercises: [
      { name: 'Подтягивания', detail: '3 подхода × максимум', type: 'Турник', rest: 90 },
      { name: 'Отжимания', detail: '3 подхода × 15', type: 'Отжимания', rest: 60 },
      { name: 'Приседания', detail: '3 подхода × 20', type: 'Кор', rest: 60 },
      { name: 'Планка', detail: '3 подхода × 45 сек', type: 'Кор', rest: 45 },
      { name: 'Плавание — длинная сессия', detail: '30 минут в воде — максимум', type: 'Плавание', rest: 0 },
    ]
  },
  0: { // Воскресенье
    name: 'Полный отдых + Озеро',
    exercises: [
      { name: 'Купание без счётчиков', detail: 'Просто плыви и наслаждайся', type: 'Плавание', rest: 0 },
      { name: 'Прогулка', detail: '30–40 минут в своё удовольствие', type: 'Кор', rest: 0 },
    ]
  }
};

// STATE
let state = JSON.parse(localStorage.getItem('workout_state') || '{}');
let history = JSON.parse(localStorage.getItem('workout_history') || '[]');

let timerInterval = null;
let timerSeconds = 0;
let timerTotal = 0;

// INIT
const now = new Date();
const todayKey = now.toISOString().split('T')[0];
const dayOfWeek = now.getDay();

if (!state[todayKey]) state[todayKey] = {};

function saveState() {
  localStorage.setItem('workout_state', JSON.stringify(state));
}

function formatDate(d) {
  return `${d.getDate()} ${MONTHS[d.getMonth()]}`;
}

// RENDER HEADER
document.getElementById('dateLabel').textContent = formatDate(now);
document.getElementById('dayTitle').textContent = DAYS[dayOfWeek];
document.getElementById('daySubtitle').textContent = PLAN[dayOfWeek]?.name || '';

// RENDER TODAY
function renderToday() {
  const plan = PLAN[dayOfWeek];
  const container = document.getElementById('page-today');
  const checked = state[todayKey];
  
  let html = '';
  let prevType = null;
  
  plan.exercises.forEach((ex, i) => {
    if (ex.type !== prevType) {
      html += `<div class="section-label">${ex.type}</div>`;
      prevType = ex.type;
    }
    const done = checked[i] ? 'done' : '';
    const checkClass = checked[i] ? 'checked' : '';
    html += `
      <div class="exercise-card ${done}" id="card-${i}">
        <div class="exercise-header">
          <div class="checkbox ${checkClass}" onclick="toggle(${i}, ${ex.rest})" id="cb-${i}"></div>
          <div class="exercise-info">
            <div class="exercise-name">${ex.name}</div>
            <div class="exercise-detail">${ex.detail}</div>
          </div>
          <div class="type-badge badge-${ex.type}">${ex.type}</div>
        </div>
      </div>`;
  });
  
  container.innerHTML = html;
  updateProgress();
}

function toggle(i, restSeconds) {
  const checked = !state[todayKey][i];
  state[todayKey][i] = checked;
  saveState();
  
  const card = document.getElementById(`card-${i}`);
  const cb = document.getElementById(`cb-${i}`);
  
  if (checked) {
    card.classList.add('done');
    cb.classList.add('checked');
    if (restSeconds > 0) startTimer(restSeconds);
  } else {
    card.classList.remove('done');
    cb.classList.remove('checked');
  }
  
  updateProgress();
}

function updateProgress() {
  const plan = PLAN[dayOfWeek];
  const total = plan.exercises.length;
  const done = Object.values(state[todayKey]).filter(Boolean).length;
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressBar').style.width = pct + '%';
}

// TIMER
function startTimer(seconds) {
  stopTimer();
  timerTotal = seconds;
  timerSeconds = seconds;
  
  const bar = document.getElementById('timerBar');
  bar.classList.add('visible');
  
  updateTimerDisplay();
  
  timerInterval = setInterval(() => {
    timerSeconds--;
    if (timerSeconds <= 0) {
      stopTimer();
      // vibrate
      if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
      return;
    }
    updateTimerDisplay();
  }, 1000);
}

function updateTimerDisplay() {
  const mins = Math.floor(timerSeconds / 60);
  const secs = timerSeconds % 60;
  const el = document.getElementById('timerCount');
  el.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
  el.className = 'timer-count' + (timerSeconds <= 10 ? ' urgent' : '');
  
  const pct = (timerSeconds / timerTotal) * 100;
  document.getElementById('timerProgressBar').style.width = pct + '%';
}

function stopTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timerBar').classList.remove('visible');
}

// TABS
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', ['today','week','stats'][i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  
  if (tab === 'stats') renderStats();
  if (tab === 'week') renderWeek();
}

// WEEK VIEW
function renderWeek() {
  const strip = document.getElementById('weekStrip');
  const planDiv = document.getElementById('weekDayPlan');
  
  let stripHtml = '';
  for (let i = 0; i < 7; i++) {
    const d = new Date(now);
    d.setDate(now.getDate() - now.getDay() + i);
    const key = d.toISOString().split('T')[0];
    const isToday = key === todayKey;
    const dayState = state[key] || {};
    const plan = PLAN[i];
    const total = plan?.exercises.length || 0;
    const done = Object.values(dayState).filter(Boolean).length;
    
    let cls = '';
    if (isToday) cls = 'today';
    else if (done === total && total > 0) cls = 'done-day';
    else if (done > 0) cls = 'partial';
    
    stripHtml += `<div class="week-day ${cls}" onclick="showWeekDay(${i})">
      ${DAYS_SHORT[i]}
      <div class="week-dot"></div>
    </div>`;
  }
  strip.innerHTML = stripHtml;
  showWeekDay(dayOfWeek);
}

function showWeekDay(day) {
  const plan = PLAN[day];
  let html = `<div class="section-label">${DAYS[day]} — ${plan.name}</div>`;
  plan.exercises.forEach(ex => {
    html += `<div class="exercise-card">
      <div class="exercise-header">
        <div class="exercise-info">
          <div class="exercise-name">${ex.name}</div>
          <div class="exercise-detail">${ex.detail}</div>
        </div>
        <div class="type-badge badge-${ex.type}">${ex.type}</div>
      </div>
    </div>`;
  });
  document.getElementById('weekDayPlan').innerHTML = html;
}

// STATS
function renderStats() {
  const allKeys = Object.keys(state);
  const totalWorkouts = allKeys.filter(k => Object.values(state[k] || {}).some(Boolean)).length;
  const totalExercises = allKeys.reduce((sum, k) => sum + Object.values(state[k] || {}).filter(Boolean).length, 0);
  
  const weekStart = new Date(now);
  weekStart.setDate(now.getDate() - now.getDay());
  const weekKeys = allKeys.filter(k => new Date(k) >= weekStart);
  const thisWeek = weekKeys.filter(k => Object.values(state[k] || {}).some(Boolean)).length;
  
  // avg completion
  let totalPct = 0; let countDays = 0;
  allKeys.forEach(k => {
    const d = new Date(k);
    const plan = PLAN[d.getDay()];
    if (!plan) return;
    const total = plan.exercises.length;
    const done = Object.values(state[k] || {}).filter(Boolean).length;
    if (total > 0) { totalPct += done/total; countDays++; }
  });
  const avg = countDays > 0 ? Math.round((totalPct/countDays)*100) : 0;
  
  // streak
  let streak = 0;
  let checkDate = new Date(now);
  while (true) {
    const key = checkDate.toISOString().split('T')[0];
    if (state[key] && Object.values(state[key]).some(Boolean)) {
      streak++;
      checkDate.setDate(checkDate.getDate() - 1);
    } else break;
  }
  
  document.getElementById('totalWorkouts').textContent = totalWorkouts;
  document.getElementById('totalExercises').textContent = totalExercises;
  document.getElementById('thisWeekCount').textContent = thisWeek;
  document.getElementById('avgCompletion').textContent = avg + '%';
  document.getElementById('streakNum').textContent = streak;
  
  // history
  const sortedKeys = allKeys.sort((a,b) => b.localeCompare(a)).slice(0,20);
  let histHtml = '';
  sortedKeys.forEach(k => {
    const d = new Date(k);
    const plan = PLAN[d.getDay()];
    if (!plan) return;
    const total = plan.exercises.length;
    const done = Object.values(state[k] || {}).filter(Boolean).length;
    const pct = Math.round((done/total)*100);
    const cls = pct === 100 ? 'score-100' : pct >= 50 ? 'score-50' : 'score-0';
    histHtml += `<div class="history-item">
      <div>
        <div class="history-date">${formatDate(d)}</div>
        <div class="history-day">${DAYS[d.getDay()]} · ${plan.name}</div>
      </div>
      <div class="history-score ${cls}">${done}/${total}</div>
    </div>`;
  });
  document.getElementById('historyList').innerHTML = histHtml || '<div style="color:var(--text3);font-size:14px;text-align:center;padding:20px">Пока нет тренировок</div>';
}

// SAVE TO NOTION
async function saveToNotion() {
  const btn = document.getElementById('saveBtn');
  const btnText = document.getElementById('saveBtnText');
  
  btn.classList.add('saving');
  btnText.textContent = 'Сохраняю...';
  
  const plan = PLAN[dayOfWeek];
  const checked = state[todayKey];
  const total = plan.exercises.length;
  const done = Object.values(checked).filter(Boolean).length;
  
  // Build pages for each exercise
  const pages = plan.exercises.map((ex, i) => ({
    properties: {
      'Упражнение': ex.name,
      'Тип': ex.type,
      'Подходы': ex.detail,
      'Выполнено': checked[i] ? '__YES__' : '__NO__',
      'День недели': DAYS[dayOfWeek],
      'date:Дата:start': todayKey,
      'date:Дата:is_datetime': 0,
      'Заметки': `${done}/${total} упражнений выполнено`
    }
  }));
  
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You save workout data to Notion. Use the Notion MCP to create pages in the workout tracker database. Always respond with just: {"success": true}',
        messages: [{
          role: 'user',
          content: `Save these workout entries to Notion database (collection://a62a0360-9a76-4340-90f0-3a52c96497cd): ${JSON.stringify(pages)}`
        }],
        mcp_servers: [{
          type: 'url',
          url: 'https://mcp.notion.com/mcp',
          name: 'notion-mcp'
        }]
      })
    });
    
    if (response.ok) {
      btn.classList.remove('saving');
      btn.classList.add('saved');
      btnText.textContent = 'Сохранено ✓';
      showToast('Тренировка сохранена в Notion! 💪', 'success');
      setTimeout(() => {
        btn.classList.remove('saved');
        btnText.textContent = 'Сохранить';
      }, 3000);
    } else {
      throw new Error('API error');
    }
  } catch(e) {
    btn.classList.remove('saving');
    btnText.textContent = 'Сохранить';
    showToast('Ошибка — данные в памяти телефона', 'error');
  }
}

// TOAST
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
